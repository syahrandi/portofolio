<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Portfolio CRUD Modern</title>

<style>
:root {
    --primary: #6c5ce7;
    --secondary: #00b894;
    --danger: #ff7675;
    --dark: #1e272e;
    --light: #f5f6fa;
    --white: #ffffff;
}

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #6c5ce7, #00b894);
    color: var(--dark);
}

.container {
    width: 90%;
    max-width: 900px;
    margin: 40px auto;
    background: var(--white);
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    border: 2px solid rgba(255,255,255,0.2);
}

h1 {
    text-align: center;
    color: var(--primary);
}

/* FORM */
form input, form textarea {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #dcdfe6;
    background: #f1f2f6;
}

form input:focus, form textarea:focus {
    border-color: var(--primary);
    outline: none;
    background: #ffffff;
}

/* BUTTON */
button {
    padding: 10px;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

button[type="submit"] {
    width: 100%;
    background: linear-gradient(135deg, #6c5ce7, #4834d4);
}

button:hover {
    transform: scale(1.03);
    opacity: 0.95;
}

/* PREVIEW */
#preview {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    margin-top: 10px;
    border-radius: 8px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 25px;
    font-size: 14px;
}

thead {
    background: linear-gradient(135deg, #1e272e, #2f3640);
    color: white;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #e6e9ef;
}

tbody tr:hover {
    background: #f1f2f6;
}

td img {
    width: 80px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
}

/* ACTION BUTTON */
.actions {
    display: flex;
    gap: 5px;
}

.btn {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    color: white;
    border: none;
}

.edit {
    background: linear-gradient(135deg, #0984e3, #74b9ff);
}

.delete {
    background: linear-gradient(135deg, #d63031, #ff7675);
}

/* MOBILE → CARD MODE */
@media (max-width: 768px) {

    table, thead, tbody, th, td, tr {
        display: block;
        width: 100%;
    }

    thead {
        display: none;
    }

    tbody tr {
        background: var(--white);
        margin-bottom: 15px;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border: 1px solid #e6e9ef;
    }

    td {
        border: none;
        padding: 8px 0;
    }

    td::before {
        font-weight: bold;
        display: block;
        color: var(--primary);
        margin-bottom: 3px;
    }

    td:nth-child(1)::before { content: "Gambar"; }
    td:nth-child(2)::before { content: "Judul"; }
    td:nth-child(3)::before { content: "Deskripsi"; }
    td:nth-child(4)::before { content: "Aksi"; }

    td img {
        width: 100%;
        height: auto;
        margin-top: 5px;
    }

    .actions {
        margin-top: 10px;
    }

    .btn {
        flex: 1;
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>💼 Portfolio Saya</h1>

    <form id="projectForm">
        <input type="text" id="title" placeholder="Judul Project" required>
        <textarea id="description" placeholder="Deskripsi" required></textarea>

        <input type="file" id="image" accept="image/*">
        <img id="preview" style="display:none;" />

        <button type="submit">Simpan</button>
    </form>

    <table id="projectTable">
        <thead>
            <tr>
                <th>Gambar</th>
                <th>Judul</th>
                <th>Deskripsi</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
let projects = JSON.parse(localStorage.getItem("projects")) || [];
let editIndex = -1;
let imageBase64 = "";

const form = document.getElementById("projectForm");
const preview = document.getElementById("preview");

// preview gambar
document.getElementById("image").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function() {
        imageBase64 = reader.result;
        preview.src = imageBase64;
        preview.style.display = "block";
    };

    if (file) reader.readAsDataURL(file);
});

// render
function renderData() {
    const tableBody = document.querySelector("#projectTable tbody");
    tableBody.innerHTML = "";

    projects.forEach((p, i) => {
        tableBody.innerHTML += `
        <tr>
            <td>${p.image ? `<img src="${p.image}">` : "-"}</td>
            <td>${p.title}</td>
            <td>${p.description}</td>
            <td>
                <div class="actions">
                    <button class="btn edit" onclick="editData(${i})">Edit</button>
                    <button class="btn delete" onclick="deleteData(${i})">Hapus</button>
                </div>
            </td>
        </tr>`;
    });

    localStorage.setItem("projects", JSON.stringify(projects));
}

// submit
form.addEventListener("submit", function(e) {
    e.preventDefault();

    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;

    const data = {
        title,
        description,
        image: imageBase64
    };

    if (editIndex === -1) {
        projects.push(data);
    } else {
        projects[editIndex] = data;
        editIndex = -1;
    }

    form.reset();
    preview.style.display = "none";
    imageBase64 = "";

    renderData();
});

// edit
function editData(index) {
    const p = projects[index];

    document.getElementById("title").value = p.title;
    document.getElementById("description").value = p.description;

    imageBase64 = p.image;
    if (p.image) {
        preview.src = p.image;
        preview.style.display = "block";
    }

    editIndex = index;
}

// delete
function deleteData(index) {
    if (confirm("Yakin hapus?")) {
        projects.splice(index, 1);
        renderData();
    }
}

renderData();
</script>

</body>
</html>
